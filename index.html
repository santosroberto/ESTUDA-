<body>
  <div id="app"></div>

  <script>
    // ─── Service Worker ───
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed:', err)
        })
      })
    }

    // ─── App Install Prompt ───
    let deferredPrompt = null
    const INSTALL_EVENT = 'app:install-ready'

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault()
      deferredPrompt = e
      window.dispatchEvent(new CustomEvent(INSTALL_EVENT, { detail: { prompt: e } }))
    })

    window.installApp = function () {
      if (!deferredPrompt) return Promise.resolve(false)
      deferredPrompt.prompt()
      return deferredPrompt.userChoice.then((choice) => {
        deferredPrompt = null
        return choice.outcome === 'accepted'
      })
    }

    // ─── Offline Detection ───
    window.addEventListener('online', () => {
      document.documentElement.removeAttribute('data-offline')
    })
    window.addEventListener('offline', () => {
      document.documentElement.setAttribute('data-offline', '')
    })
    if (!navigator.onLine) {
      document.documentElement.setAttribute('data-offline', '')
    }

    // ─── Prevent pull-to-refresh on iOS standalone ───
    if (window.navigator.standalone) {
      document.addEventListener('touchmove', (e) => {
        if (e.target.closest('.modal-overlay, .sidebar, .pomodoro__cycles-list, .session__history')) return
        e.preventDefault()
      }, { passive: false })
    }
  </script>

  <script type="module" src="/src/app.js"></script>
</body>
